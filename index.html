<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Cash • Daily Spin</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #f6f9fc 0%, #edf2f7 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        .main-container {
            max-width: 1300px;
            width: 100%;
            z-index: 10;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 30px;
            padding: 20px 35px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-area i {
            font-size: 36px;
            color: #fbbf24;
            filter: drop-shadow(0 4px 6px #fbbf2450);
        }

        .logo-area h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, #1e293b, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .balance-card {
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            border-radius: 100px;
            padding: 15px 35px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.8), 0 8px 12px -8px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.8);
        }

        .balance-label {
            color: #475569;
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .balance-amount {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .balance-currency {
            color: #64748b;
            font-weight: 600;
            font-size: 18px;
        }

        /* Main Grid */
        .content-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.9fr;
            gap: 30px;
        }

        /* Spin Card */
        .spin-card {
            background: white;
            border-radius: 50px;
            padding: 40px;
            box-shadow: 0 30px 60px -20px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.8);
            position: relative;
            overflow: hidden;
        }

        .spin-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 70% 30%, rgba(251,191,36,0.03), transparent 50%);
            pointer-events: none;
        }

        .spin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .spin-header h2 {
            font-size: 32px;
            font-weight: 700;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .spin-header h2 i {
            color: #fbbf24;
            font-size: 36px;
            filter: drop-shadow(0 4px 8px #fbbf2460);
        }

        /* Hidden Timer - Sirf system ke liye, user ko nahi dikhega */
        .hidden-timer {
            display: none;
        }

        /* Wheel */
        .wheel-wrapper {
            position: relative;
            width: 380px;
            margin: 20px auto 30px;
        }

        canvas#wheelCanvas {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 50%;
            box-shadow: 0 30px 50px -15px rgba(0,0,0,0.3), 0 0 0 6px white, 0 0 0 8px #fbbf2420;
            transition: transform 0.1s ease-out;
        }

        .wheel-pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 22px solid transparent;
            border-right: 22px solid transparent;
            border-top: 45px solid #dc2626;
            filter: drop-shadow(0 8px 12px #dc262660);
            z-index: 5;
        }

        .wheel-pointer::after {
            content: '';
            position: absolute;
            top: -52px;
            left: -8px;
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 0 4px #fbbf24;
        }

        /* Spin Button */
        .spin-btn {
            width: 100%;
            padding: 22px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border: none;
            border-radius: 80px;
            color: white;
            font-size: 26px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 20px 30px -8px #fbbf24, 0 6px 0 #b45309;
            transition: all 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 30px 0 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .spin-btn:active {
            transform: translateY(6px);
            box-shadow: 0 15px 25px -8px #fbbf24, 0 2px 0 #b45309;
        }

        .spin-btn:disabled {
            opacity: 0.5;
            transform: translateY(6px);
            box-shadow: 0 10px 20px -8px #fbbf24, 0 2px 0 #b45309;
            cursor: not-allowed;
        }

        /* Result */
        .result-message {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: #1e293b;
            padding: 20px;
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.8), 0 8px 12px -8px rgba(0,0,0,0.1);
        }

        /* Withdrawal Card */
        .withdraw-card {
            background: white;
            border-radius: 50px;
            padding: 40px;
            box-shadow: 0 30px 60px -20px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.8);
            position: relative;
            overflow: hidden;
        }

        .withdraw-card::before {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -20%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(251,191,36,0.03), transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .withdraw-header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px dashed #e2e8f0;
        }

        .withdraw-header h2 {
            font-size: 32px;
            font-weight: 700;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .withdraw-header h2 span {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            color: white;
            padding: 5px 15px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* Method Grid */
        .method-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .method-btn {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 30px;
            padding: 25px 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 6px -2px rgba(0,0,0,0.05);
        }

        .method-btn img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.1));
            transition: transform 0.3s;
        }

        .method-btn:hover {
            transform: translateY(-5px);
            border-color: #fbbf24;
            box-shadow: 0 20px 30px -10px #fbbf2480;
        }

        .method-btn:hover img {
            transform: scale(1.1);
        }

        .method-btn.active {
            border-color: #fbbf24;
            background: linear-gradient(135deg, #fef9e7, #fff3cd);
            box-shadow: 0 15px 25px -8px #fbbf24;
        }

        .method-btn span {
            font-weight: 700;
            color: #334155;
            font-size: 16px;
            letter-spacing: 0.5px;
        }

        /* Form */
        .withdraw-form {
            margin-top: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            color: #475569;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
            padding-left: 15px;
        }

        .form-group input {
            width: 100%;
            padding: 18px 25px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 40px;
            color: #1e293b;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .form-group input:focus {
            outline: none;
            border-color: #fbbf24;
            background: white;
            box-shadow: 0 0 0 4px #fbbf2420, inset 0 2px 4px rgba(0,0,0,0.02);
        }

        .withdraw-action-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            border: none;
            border-radius: 60px;
            color: white;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 30px 0 20px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            box-shadow: 0 20px 30px -10px #fbbf24;
            border: 2px solid rgba(255,255,255,0.3);
        }

        .withdraw-action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 25px 35px -8px #fbbf24;
        }

        .withdraw-action-btn:active {
            transform: translateY(2px);
            box-shadow: 0 15px 25px -8px #fbbf24;
        }

        /* History */
        .withdraw-history {
            margin-top: 30px;
            background: linear-gradient(135deg, #f8fafc, #f1f5f9);
            border-radius: 40px;
            padding: 25px;
            max-height: 220px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.8), 0 8px 12px -8px rgba(0,0,0,0.1);
        }

        .history-title {
            color: #334155;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #cbd5e1;
        }

        .history-title i {
            color: #fbbf24;
            font-size: 22px;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: white;
            border-radius: 30px;
            margin-bottom: 10px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -2px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .history-item:hover {
            transform: translateX(5px);
            border-color: #fbbf24;
        }

        .history-item span:first-child {
            font-weight: 500;
            color: #475569;
        }

        .history-item span:nth-child(2) {
            font-weight: 700;
            color: #fbbf24;
        }

        .history-item span:last-child {
            background: #dcfce7;
            color: #166534;
            padding: 5px 15px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
        }

        /* Stats - Yeh roz update honge */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 30px;
        }

        .stat-box {
            background: white;
            border-radius: 40px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.8);
            transition: transform 0.3s;
        }

        .stat-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 45px -15px #fbbf24;
        }

        .stat-number {
            font-size: 38px;
            font-weight: 800;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .stat-label {
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Money Rain */
        .money-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .money-note {
            position: absolute;
            color: #fbbf24;
            font-size: 28px;
            opacity: 0;
            animation: moneyFall 3s linear forwards;
            filter: drop-shadow(0 10px 10px #fbbf2480);
        }

        @keyframes moneyFall {
            0% { transform: translateY(-100px) rotate(0deg) scale(0.5); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg) scale(1.5); opacity: 0; }
        }

        /* Hidden Timer - Sirf system ke liye */
        .system-timer {
            display: none;
        }

        /* Responsive */
        @media (max-width: 1000px) {
            .content-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .header { flex-direction: column; gap: 15px; }
            .method-grid { grid-template-columns: 1fr; }
            .wheel-wrapper { width: 280px; }
        }
    </style>
</head>
<body>
    <div class="money-rain" id="moneyRain"></div>

    <!-- Hidden System Timer - User ko nahi dikhega -->
    <div class="system-timer" id="systemTimer"></div>

    <div class="main-container">
        <!-- Header -->
        <div class="header">
            <div class="logo-area">
                <i class="fas fa-coins"></i>
                <h1>Earn Cash</h1>
            </div>
            <div class="balance-card">
                <span class="balance-label">Your Balance</span>
                <span class="balance-amount" id="userBalance">0</span>
                <span class="balance-currency">PKR</span>
            </div>
        </div>

        <!-- Main Grid -->
        <div class="content-grid">
            <!-- Spin Card -->
            <div class="spin-card">
                <div class="spin-header">
                    <h2>
                        <i class="fas fa-dharmachakra"></i>
                        Daily Spin
                    </h2>
                </div>

                <div class="wheel-wrapper">
                    <canvas id="wheelCanvas" width="400" height="400"></canvas>
                    <div class="wheel-pointer"></div>
                </div>

                <button class="spin-btn" id="spinButton" onclick="spinWheel()">
                    <i class="fas fa-dharmachakra"></i> SPIN NOW
                </button>

                <div class="result-message" id="spinResult">
                    Click Spin to try your luck!
                </div>
            </div>

            <!-- Withdrawal Card -->
            <div class="withdraw-card">
                <div class="withdraw-header">
                    <h2>
                        Withdraw Cash
                        <span>INSTANT</span>
                    </h2>
                </div>

                <!-- Method Grid -->
                <div class="method-grid">
                    <div class="method-btn active" id="methodEasypaisa" onclick="selectMethod('easypaisa')">
                        <img src="https://crystalpng.com/wp-content/uploads/2026/03/easypaisa-logo.png" 
                             alt="Easypaisa"
                             onerror="this.src='https://crystalpng.com/product/easypaisa-logo/'">
                        <span>Easypaisa</span>
                    </div>
                    <div class="method-btn" id="methodJazzcash" onclick="selectMethod('jazzcash')">
                        <img src="https://crystalpng.com/wp-content/uploads/2024/12/new-jazzcash-logo.png" 
                             alt="JazzCash"
                             onerror="this.src='https://crystalpng.com/product/new-jazzcash-logo/'">
                        <span>JazzCash</span>
                    </div>
                    <div class="method-btn" id="methodUpaisa" onclick="selectMethod('upaisa')">
                        <img src="https://crystalpng.com/wp-content/uploads/2025/09/upaisa-logo.png" 
                             alt="UPaisa"
                             onerror="this.src='https://crystalpng.com/product/upaisa-logo/'">
                        <span>UPaisa</span>
                    </div>
                </div>

                <!-- Form -->
                <div class="withdraw-form">
                    <div class="form-group">
                        <label>FULL NAME</label>
                        <input type="text" id="accountName" placeholder="e.g., Muhammad Ali" value="Muhammad Ali">
                    </div>
                    <div class="form-group">
                        <label>MOBILE NUMBER</label>
                        <input type="text" id="accountNumber" placeholder="03XX-XXXXXXX" value="0300 1234567">
                    </div>
                    <div class="form-group">
                        <label>AMOUNT (PKR) - MIN 100</label>
                        <input type="number" id="withdrawAmount" placeholder="Enter amount" value="100" min="100">
                    </div>

                    <button class="withdraw-action-btn" onclick="processWithdrawal()">
                        <i class="fas fa-arrow-right"></i> WITHDRAW NOW
                    </button>
                </div>

                <!-- History -->
                <div class="withdraw-history">
                    <div class="history-title">
                        <i class="fas fa-clock-rotate-left"></i> Recent Transactions
                    </div>
                    <div id="historyList">
                        <!-- History will be loaded dynamically -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats - Yeh roz update honge -->
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-number" id="totalWon">0</div>
                <div class="stat-label">Total Won</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="todaySpins">0</div>
                <div class="stat-label">Today's Spins</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="biggestWin">0</div>
                <div class="stat-label">Biggest Win</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="payouts">0</div>
                <div class="stat-label">Payouts</div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ========== INITIALIZATION ==========
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const spinResult = document.getElementById('spinResult');
            const spinButton = document.getElementById('spinButton');
            const balanceSpan = document.getElementById('userBalance');
            
            // Stats elements
            const totalWonEl = document.getElementById('totalWon');
            const todaySpinsEl = document.getElementById('todaySpins');
            const biggestWinEl = document.getElementById('biggestWin');
            const payoutsEl = document.getElementById('payouts');
            const historyList = document.getElementById('historyList');

            // Prize segments
            const segments = [
                { label: '1 RS', value: 1, emoji: '💰', color: '#F87171' },
                { label: '😞 Oops', value: 0, emoji: '😞', color: '#9CA3AF' },
                { label: '10 RS', value: 10, emoji: '💰', color: '#FBBF24' },
                { label: '2 RS', value: 2, emoji: '💰', color: '#FCA5A5' },
                { label: '😞 Oops', value: 0, emoji: '😞', color: '#9CA3AF' },
                { label: '15 RS', value: 15, emoji: '💰', color: '#34D399' },
                { label: '5 RS', value: 5, emoji: '💰', color: '#60A5FA' },
                { label: '😞 Oops', value: 0, emoji: '😞', color: '#9CA3AF' },
                { label: '5.5 RS', value: 5.5, emoji: '💰', color: '#C084FC' }
            ];

            let currentAngle = 0;
            let isSpinning = false;
            let balance = parseFloat(localStorage.getItem('userBalance')) || 0;
            
            // Daily stats - yeh har 24 ghante reset honge
            let dailyStats = loadDailyStats();
            
            balanceSpan.innerText = balance.toFixed(1);
            updateStatsDisplay();

            // ========== DAILY STATS MANAGEMENT ==========
            function loadDailyStats() {
                const today = new Date().toDateString();
                const saved = localStorage.getItem('dailyStats');
                
                if (saved) {
                    const stats = JSON.parse(saved);
                    if (stats.date === today) {
                        return stats;
                    }
                }
                
                // New day - reset stats
                const newStats = {
                    date: today,
                    totalWon: 0,
                    todaySpins: 0,
                    biggestWin: 0,
                    payouts: 0,
                    history: []
                };
                
                localStorage.setItem('dailyStats', JSON.stringify(newStats));
                return newStats;
            }

            function saveDailyStats() {
                localStorage.setItem('dailyStats', JSON.stringify(dailyStats));
            }

            function updateStatsDisplay() {
                totalWonEl.innerText = dailyStats.totalWon.toLocaleString();
                todaySpinsEl.innerText = dailyStats.todaySpins.toLocaleString();
                biggestWinEl.innerText = dailyStats.biggestWin;
                payoutsEl.innerText = dailyStats.payouts.toLocaleString();
                
                // Update history
                historyList.innerHTML = dailyStats.history.map(item => `
                    <div class="history-item">
                        <span>${item.method} • ${item.number.slice(0,4)}******</span>
                        <span>${item.amount} PKR</span>
                        <span>${item.status}</span>
                    </div>
                `).join('');
            }

            // ========== SPIN AVAILABILITY CHECK (Hidden) ==========
            function canSpin() {
                const lastSpinTime = localStorage.getItem('lastSpinTime');
                if (!lastSpinTime) return true;
                
                const hoursPassed = (Date.now() - parseInt(lastSpinTime)) / (1000 * 60 * 60);
                return hoursPassed >= 24;
            }

            // ========== DRAW WHEEL ==========
            function drawWheel(angle = 0) {
                const arc = (2 * Math.PI) / segments.length;
                ctx.clearRect(0, 0, 400, 400);
                
                for (let i = 0; i < segments.length; i++) {
                    const startAngle = i * arc + angle;
                    const endAngle = startAngle + arc;
                    
                    ctx.beginPath();
                    ctx.fillStyle = segments[i].color;
                    ctx.moveTo(200, 200);
                    ctx.arc(200, 200, 200, startAngle, endAngle);
                    ctx.closePath();
                    ctx.fill();

                    ctx.save();
                    ctx.translate(200, 200);
                    ctx.rotate(startAngle + arc / 2);
                    ctx.textAlign = 'center';
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 16px Inter';
                    ctx.shadowColor = 'rgba(0,0,0,0.3)';
                    ctx.shadowBlur = 8;
                    ctx.fillText(segments[i].label, 100, 8);
                    ctx.restore();
                }

                ctx.beginPath();
                ctx.arc(200, 200, 45, 0, 2 * Math.PI);
                ctx.fillStyle = '#fbbf24';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#fbbf24';
                ctx.fill();
                ctx.shadowBlur = 0;
                
                ctx.beginPath();
                ctx.arc(200, 200, 35, 0, 2 * Math.PI);
                ctx.fillStyle = 'white';
                ctx.fill();
            }

            drawWheel(currentAngle);

            // ========== MONEY RAIN ==========
            function startMoneyRain(prize) {
                const rainContainer = document.getElementById('moneyRain');
                for (let i = 0; i < 20; i++) {
                    const note = document.createElement('div');
                    note.className = 'money-note';
                    note.innerHTML = '💰';
                    note.style.left = Math.random() * 100 + '%';
                    note.style.animationDelay = Math.random() * 2 + 's';
                    note.style.fontSize = (Math.random() * 20 + 25) + 'px';
                    rainContainer.appendChild(note);
                    
                    setTimeout(() => {
                        note.remove();
                    }, 3000);
                }
            }

            // ========== SPIN FUNCTION ==========
            window.spinWheel = function() {
                if (isSpinning) return;
                
                // Check if can spin (24 hours condition)
                if (!canSpin()) {
                    const lastSpin = localStorage.getItem('lastSpinTime');
                    const hoursLeft = 24 - ((Date.now() - parseInt(lastSpin)) / (1000 * 60 * 60));
                    spinResult.innerHTML = `⏰ Please wait ${Math.ceil(hoursLeft)} hours for next spin!`;
                    return;
                }

                isSpinning = true;
                spinButton.disabled = true;
                spinResult.innerHTML = 'Spinning...';

                let spinVelocity = 0.6;
                const spinDeceleration = 0.97;
                
                function animateSpin() {
                    spinVelocity *= spinDeceleration;
                    currentAngle += spinVelocity;
                    drawWheel(currentAngle);

                    if (spinVelocity > 0.002) {
                        requestAnimationFrame(animateSpin);
                    } else {
                        const finalAngle = currentAngle % (2 * Math.PI);
                        let segmentIndex = Math.floor((2 * Math.PI - finalAngle) / ((2 * Math.PI) / segments.length)) % segments.length;
                        
                        const prize = segments[segmentIndex].value;
                        
                        if (prize > 0) {
                            // Update balance
                            balance = parseFloat((balance + prize).toFixed(1));
                            balanceSpan.innerText = balance.toFixed(1);
                            localStorage.setItem('userBalance', balance);
                            
                            // Update daily stats
                            dailyStats.totalWon += prize;
                            dailyStats.todaySpins += 1;
                            if (prize > dailyStats.biggestWin) {
                                dailyStats.biggestWin = prize;
                            }
                            
                            spinResult.innerHTML = `🎉 Congratulations! You won ${prize} PKR!`;
                            startMoneyRain(prize);
                        } else {
                            spinResult.innerHTML = `😞 Oops! Better luck next time!`;
                        }
                        
                        // Save spin time
                        localStorage.setItem('lastSpinTime', Date.now());
                        
                        // Save stats and update display
                        saveDailyStats();
                        updateStatsDisplay();
                        
                        isSpinning = false;
                        spinButton.disabled = false;
                    }
                }

                requestAnimationFrame(animateSpin);
            };

            // ========== WITHDRAWAL SYSTEM ==========
            window.selectMethod = function(method) {
                document.querySelectorAll('.method-btn').forEach(btn => btn.classList.remove('active'));
                if (method === 'easypaisa') document.getElementById('methodEasypaisa').classList.add('active');
                if (method === 'jazzcash') document.getElementById('methodJazzcash').classList.add('active');
                if (method === 'upaisa') document.getElementById('methodUpaisa').classList.add('active');
            };

            window.processWithdrawal = function() {
                const amount = parseFloat(document.getElementById('withdrawAmount').value);
                const name = document.getElementById('accountName').value;
                const number = document.getElementById('accountNumber').value;
                
                let method = 'Easypaisa';
                if (document.getElementById('methodJazzcash').classList.contains('active')) method = 'JazzCash';
                if (document.getElementById('methodUpaisa').classList.contains('active')) method = 'UPaisa';

                if (!name || !number) {
                    alert('❌ Please fill all details');
                    return;
                }

                if (amount < 100) {
                    alert('❌ Minimum withdrawal is 100 PKR');
                    return;
                }

                if (amount > balance) {
                    alert('❌ Insufficient balance');
                    return;
                }

                // Process withdrawal
                balance = parseFloat((balance - amount).toFixed(1));
                balanceSpan.innerText = balance.toFixed(1);
                localStorage.setItem('userBalance', balance);
                
                // Update daily stats
                dailyStats.payouts += 1;
                
                // Add to history
                const transaction = {
                    method: method,
                    number: number,
                    amount: amount,
                    status: 'Pending',
                    time: new Date().toLocaleTimeString()
                };
                
                dailyStats.history.unshift(transaction);
                if (dailyStats.history.length > 5) {
                    dailyStats.history.pop();
                }
                
                saveDailyStats();
                updateStatsDisplay();

                alert(`✅ Withdrawal request submitted!\nAmount: ${amount} PKR\nMethod: ${method}`);
            };

            // Check for new day every minute
            setInterval(() => {
                const newStats = loadDailyStats();
                if (newStats.date !== dailyStats.date) {
                    dailyStats = newStats;
                    updateStatsDisplay();
                }
            }, 60000);
        })();
    </script>
</body>
</html>
