<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Previewer Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --bg-dark: #0a0a0f;
            --bg-panel: #13131f;
            --bg-input: #1a1a2e;
            --border: #2a2a3e;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent: #6366f1;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo i {
            font-size: 1.75rem;
            -webkit-text-fill-color: var(--primary);
        }

        /* View Toggles */
        .view-toggles {
            display: flex;
            background: var(--bg-input);
            border-radius: 12px;
            padding: 4px;
            border: 1px solid var(--border);
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .toggle-btn:hover {
            color: var(--text-primary);
            background: rgba(255,255,255,0.05);
        }

        .toggle-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .actions {
            display: flex;
            gap: 0.75rem;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-input);
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .icon-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .icon-btn.success {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        /* Main Container */
        .container {
            display: flex;
            height: calc(100vh - 70px);
            position: relative;
        }

        /* Editor Section */
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-panel);
            border-right: 1px solid var(--border);
            min-width: 0;
            transition: all 0.3s ease;
        }

        .panel-header {
            padding: 0.75rem 1.25rem;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .editor-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .line-numbers {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 50px;
            background: var(--bg-input);
            border-right: 1px solid var(--border);
            padding: 1rem 0;
            text-align: right;
            padding-right: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-secondary);
            user-select: none;
            overflow: hidden;
        }

        textarea {
            width: 100%;
            height: 100%;
            background: var(--bg-panel);
            border: none;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            line-height: 1.6;
            padding: 1rem 1rem 1rem 65px;
            resize: none;
            outline: none;
            tab-size: 2;
        }

        /* Preview Section */
        .preview-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            min-width: 0;
            transition: all 0.3s ease;
        }

        .preview-header {
            padding: 0.75rem 1.25rem;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            font-weight: 600;
            color: #64748b;
        }

        .device-toggles {
            display: flex;
            gap: 0.5rem;
        }

        .device-btn {
            background: transparent;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            padding: 0.25rem;
            font-size: 1rem;
            transition: color 0.2s;
        }

        .device-btn:hover, .device-btn.active {
            color: var(--primary);
        }

        iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: white;
        }

        /* Hide panels based on mode */
        .mode-code-only .preview-panel {
            display: none;
        }

        .mode-code-only .editor-panel {
            width: 100%;
        }

        .mode-preview-only .editor-panel {
            display: none;
        }

        .mode-preview-only .preview-panel {
            width: 100%;
        }

        .mode-split .editor-panel,
        .mode-split .preview-panel {
            flex: 1;
        }

        /* Resizer (for split mode) */
        .resizer {
            width: 6px;
            background: var(--border);
            cursor: col-resize;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .resizer:hover {
            background: var(--primary);
        }

        .resizer::after {
            content: '';
            width: 2px;
            height: 30px;
            background: rgba(255,255,255,0.2);
            border-radius: 2px;
        }

        /* Status Bar */
        .status-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-panel);
            border-top: 1px solid var(--border);
            padding: 0.5rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: var(--text-secondary);
            z-index: 100;
        }

        .status-left, .status-right {
            display: flex;
            gap: 1.5rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 60px;
            right: 20px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-icon {
            width: 32px;
            height: 32px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 1rem;
            }

            .logo span {
                display: none;
            }

            .toggle-btn span {
                display: none;
            }

            .container {
                flex-direction: column;
            }

            .mode-split .editor-panel,
            .mode-split .preview-panel {
                height: 50%;
            }

            .resizer {
                display: none;
            }

            textarea {
                font-size: 13px;
            }
        }

        /* Fullscreen mode */
        .fullscreen .preview-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9999;
        }

        .fullscreen .header,
        .fullscreen .editor-panel,
        .fullscreen .status-bar {
            display: none;
        }

        .exit-fullscreen {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            border: none;
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            cursor: pointer;
            z-index: 10000;
            display: none;
            font-weight: 600;
        }

        .fullscreen .exit-fullscreen {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-panel);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
    </style>
</head>
<body class="mode-split">

    <button class="exit-fullscreen" onclick="toggleFullscreen()">
        <i class="fas fa-compress"></i> Exit Fullscreen
    </button>

    <!-- Header -->
    <header class="header">
        <div class="logo">
            <i class="fas fa-code"></i>

            </div>
            <div class="editor-wrapper">
                <div class="line-numbers" id="lineNumbers">1</div>
                <textarea id="htmlCode" spellcheck="false" placeholder="<!-- Type your HTML code here... -->

<head>

<body>
    <div class="container">
        <h1>Welcome! 🚀</h1>
        <p>Edit the code on the left to see changes instantly.</p>
        <a href="#" class="btn">Get Started</a>
    </div>

</html></textarea>
            </div>
        </div>

        <div class="resizer" id="resizer"></div>

        <!-- Preview Panel -->
        <div class="preview-panel">
            <div class="preview-header">
                <span><i class="fas fa-eye"></i> Live Preview</span>
                <div class="device-toggles">
                    <button class="device-btn active" title="Desktop"><i class="fas fa-desktop"></i></button>
                    <button class="device-btn" title="Tablet"><i class="fas fa-tablet-alt"></i></button>
                    <button class="device-btn" title="Mobile"><i class="fas fa-mobile-alt"></i></button>
                </div>
            </div>
            <iframe id="preview"></iframe>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-left">
            <div class="status-item">
                <div class="status-indicator"></div>
                <span>Ready</span>
            </div>
            <div class="status-item">
                <i class="fas fa-code"></i>
                <span id="lineCount">1 line</span>
            </div>
            <div class="status-item">
                <i class="fas fa-font"></i>
                <span id="charCount">0 chars</span>
            </div>
        </div>
        <div class="status-right">
            <div class="status-item">
                <i class="fas fa-keyboard"></i>
                <span>Ctrl+Enter to Run</span>
            </div>
            <div class="status-item">
                <span>HTML5</span>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <div class="toast-icon">
            <i class="fas fa-check"></i>
        </div>
        <div>
            <div style="font-weight: 600; margin-bottom: 0.25rem;">Success</div>
            <div style="font-size: 0.875rem; opacity: 0.8;" id="toastMessage">Code copied to clipboard!</div>
        </div>
    </div>

    <script>
        const textarea = document.getElementById('htmlCode');
        const lineNumbers = document.getElementById('lineNumbers');
        const preview = document.getElementById('preview');
        const container = document.getElementById('container');
        const lineCountEl = document.getElementById('lineCount');
        const charCountEl = document.getElementById('charCount');

        // Initialize
        let currentMode = 'split';
        let isFullscreen = false;

        // Update Line Numbers
        function updateLineNumbers() {
            const lines = textarea.value.split('\n').length;
            lineNumbers.innerHTML = Array(lines).fill(0).map((_, i) => i + 1).join('<br>');
            lineCountEl.textContent = lines + ' line' + (lines !== 1 ? 's' : '');
            charCountEl.textContent = textarea.value.length + ' chars';
        }

        // Sync Scroll
        textarea.addEventListener('scroll', () => {
            lineNumbers.scrollTop = textarea.scrollTop;
        });

        // Update Preview
        function runCode() {
            const code = textarea.value;
            const previewDoc = preview.contentDocument || preview.contentWindow.document;
            previewDoc.open();
            previewDoc.write(code);
            previewDoc.close();
            showToast('Preview updated successfully!');
        }

        // Auto-run on input (debounced)
        let timeout;
        textarea.addEventListener('input', () => {
            updateLineNumbers();
            clearTimeout(timeout);
            timeout = setTimeout(runCode, 1000); // Auto-run after 1 second of no typing
        });

        // Tab key support
        textarea.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                textarea.value = textarea.value.substring(0, start) + '  ' + textarea.value.substring(end);
                textarea.selectionStart = textarea.selectionEnd = start + 2;
            }
            
            // Ctrl+Enter to run
            if (e.ctrlKey && e.key === 'Enter') {
                runCode();
            }
        });

        // View Modes
        function setMode(mode) {
            currentMode = mode;
            document.body.className = 'mode-' + mode;
            
            // Update buttons
            document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + mode).classList.add('active');
            
            // If going to preview-only, run code first
            if (mode === 'preview-only') {
                runCode();
            }
            
            // Save preference
            localStorage.setItem('previewMode', mode);
        }

        // Clear Code
        function clearCode() {
            if (confirm('Are you sure you want to clear the editor?')) {
                textarea.value = '';
                updateLineNumbers();
                runCode();
                showToast('Editor cleared');
            }
        }

        // Copy Code
        function copyCode() {
            textarea.select();
            document.execCommand('copy');
            window.getSelection().removeAllRanges();
            
            // Visual feedback on button
            const btn = event.currentTarget;
            btn.classList.add('success');
            btn.innerHTML = '<i class="fas fa-check"></i>';
            setTimeout(() => {
                btn.classList.remove('success');
                btn.innerHTML = '<i class="fas fa-copy"></i>';
            }, 2000);
            
            showToast('Code copied to clipboard!');
        }

        // Download HTML
        function downloadHTML() {
            const blob = new Blob([textarea.value], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'index.html';
            a.click();
            URL.revokeObjectURL(url);
            showToast('File downloaded successfully!');
        }

        // Toggle Fullscreen
        function toggleFullscreen() {
            isFullscreen = !isFullscreen;
            if (isFullscreen) {
                document.body.classList.add('fullscreen');
                runCode();
            } else {
                document.body.classList.remove('fullscreen');
            }
        }

        // Toast Notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Resizer functionality (for split mode)
        let isResizing = false;
        const resizer = document.getElementById('resizer');
        const editorPanel = document.querySelector('.editor-panel');
        
        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const containerWidth = container.offsetWidth;
            const newWidth = (e.clientX / containerWidth) * 100;
            if (newWidth > 20 && newWidth < 80) {
                editorPanel.style.flex = `0 0 ${newWidth}%`;
            }
        });

        document.addEventListener('mouseup', () => {
            isResizing = false;
            document.body.style.cursor = 'default';
        });

        // Load saved code
        window.addEventListener('load', () => {
            const savedCode = localStorage.getItem('htmlCode');
            const savedMode = localStorage.getItem('previewMode');
            
            if (savedCode) {
                textarea.value = savedCode;
            }
            
            if (savedMode) {
                setMode(savedMode);
            }
            
            updateLineNumbers();
            runCode();
        });

        // Auto-save
        setInterval(() => {
            localStorage.setItem('htmlCode', textarea.value);
        }, 5000);

        // Keyboard shortcuts help
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 's') {
                e.preventDefault();
                downloadHTML();
            }
        });

        // Initialize line numbers
        updateLineNumbers();
    </script>
</body>
</html>
