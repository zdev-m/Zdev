<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ae • sthetic</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0c0c0e;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* 3D Animated Background */
        #canvas-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: radial-gradient(circle at 20% 30%, rgba(98, 91, 255, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(255, 126, 95, 0.08) 0%, transparent 40%);
        }

        /* Floating Particles */
        .particle {
            position: fixed;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Minimal Navbar */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            margin-bottom: 40px;
            box-shadow: 0 20px 40px -20px rgba(0, 0, 0, 0.5);
        }

        .logo {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.7);
        }

        .nav-links {
            display: flex;
            gap: 10px;
        }

        .nav-links a {
            padding: 10px 24px;
            border-radius: 40px;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-weight: 400;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.9);
        }

        /* Hero Section */
        .hero {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeUp 1s ease-out;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero h1 {
            font-size: clamp(40px, 8vw, 100px);
            font-weight: 300;
            letter-spacing: -2px;
            line-height: 1;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffffff, #a0a0a0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .hero p {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        /* Main Chat Container */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        /* Messages Area */
        .messages-area {
            flex: 1;
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            min-height: 400px;
            max-height: 600px;
            overflow-y: auto;
            box-shadow: 0 50px 100px -30px rgba(0, 0, 0, 0.5);
            scroll-behavior: smooth;
        }

        .messages-area::-webkit-scrollbar {
            width: 6px;
        }

        .messages-area::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .message {
            margin-bottom: 30px;
            animation: messageSlide 0.4s ease;
        }

        @keyframes messageSlide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            text-align: right;
        }

        .message-content {
            display: inline-block;
            max-width: 80%;
            padding: 18px 28px;
            border-radius: 40px;
            font-size: 16px;
            line-height: 1.6;
            letter-spacing: 0.2px;
        }

        .user .message-content {
            background: rgba(98, 91, 255, 0.1);
            border: 1px solid rgba(98, 91, 255, 0.2);
            color: rgba(255, 255, 255, 0.9);
            border-bottom-right-radius: 10px;
        }

        .assistant .message-content {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.8);
            border-bottom-left-radius: 10px;
        }

        .timestamp {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        /* Input Area */
        .input-area {
            display: flex;
            gap: 15px;
            align-items: center;
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 80px;
            padding: 10px 10px 10px 30px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            box-shadow: 0 20px 40px -20px rgba(0, 0, 0, 0.5);
        }

        .input-area input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 22px 0;
            color: white;
            font-size: 16px;
            font-weight: 300;
            letter-spacing: 0.5px;
            outline: none;
        }

        .input-area input::placeholder {
            color: rgba(255, 255, 255, 0.2);
            font-weight: 300;
        }

        .action-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            position: relative;
            overflow: hidden;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transform: translate(-50%, -50%);
            transition: width 0.4s, height 0.4s;
        }

        .action-btn:hover::before {
            width: 100px;
            height: 100px;
        }

        .action-btn:hover {
            color: white;
            border-color: rgba(255, 255, 255, 0.15);
            transform: scale(1.05);
            box-shadow: 0 10px 30px -10px rgba(255, 255, 255, 0.2);
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .action-btn.primary {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .action-btn.listening {
            background: rgba(255, 126, 95, 0.15);
            border-color: rgba(255, 126, 95, 0.3);
            color: #ff7e5f;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 126, 95, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 126, 95, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 126, 95, 0); }
        }

        /* Features Section */
        .features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 60px;
        }

        .feature {
            padding: 30px;
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            transition: transform 0.3s;
        }

        .feature:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.02);
        }

        .feature i {
            font-size: 32px;
            color: rgba(255, 255, 255, 0.3);
            margin-bottom: 20px;
        }

        .feature h3 {
            font-size: 18px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .feature p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.3);
            line-height: 1.6;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 80px;
            padding: 30px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
            letter-spacing: 2px;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 18px 28px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 40px;
            width: fit-content;
            border-bottom-left-radius: 10px;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); background: rgba(255, 255, 255, 0.6); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .features {
                grid-template-columns: 1fr;
            }
            
            .input-area {
                flex-wrap: wrap;
                border-radius: 40px;
            }
            
            .action-btn {
                width: 50px;
                height: 50px;
            }
        }
    </style>
</head>
<body>
    <!-- 3D Canvas Background -->
    <canvas id="canvas-bg"></canvas>

    <div class="container">
        <!-- Minimal Navbar -->
        <nav>
            <div class="logo">ae</div>
            <div class="nav-links">
                <a href="#">dialogue</a>
                <a href="#">space</a>
                <a href="#">mute</a>
            </div>
        </nav>

        <!-- Hero -->
        <div class="hero">
            <h1>aesthetic dialogue</h1>
            <p>timeless conversation • classic form</p>
        </div>

        <!-- Main Chat Container -->
        <div class="chat-container">
            <!-- Messages Area -->
            <div class="messages-area" id="messagesArea">
                <div class="message assistant">
                    <div class="message-content">
                        hello. ask me anything.
                    </div>
                    <div class="timestamp">just now</div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <input type="text" id="userInput" placeholder="type your question..." autocomplete="off">
                
                <button class="action-btn" id="voiceBtn" onclick="toggleVoice()">
                    <i class="fas fa-microphone"></i>
                </button>
                
                <button class="action-btn primary" id="sendBtn" onclick="sendMessage()">
                    <i class="fas fa-arrow-up"></i>
                </button>
            </div>
        </div>

        <!-- Features -->
        <div class="features">
            <div class="feature">
                <i class="fas fa-message"></i>
                <h3>infinite dialogue</h3>
                <p>ask anything. receive clarity.</p>
            </div>
            <div class="feature">
                <i class="fas fa-microphone"></i>
                <h3>voice presence</h3>
                <p>speak naturally. hear response.</p>
            </div>
            <div class="feature">
                <i class="fas fa-palette"></i>
                <h3>aesthetic form</h3>
                <p>beauty in simplicity.</p>
            </div>
        </div>

        <!-- Footer -->
        <footer>
            <p>ae • twenty twenty six</p>
        </footer>
    </div>

    <script>
        // ==================== 3D BACKGROUND ====================
        const canvas = document.getElementById('canvas-bg');
        const ctx = canvas.getContext('2d');
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = Math.random() * 0.3 - 0.15;
                this.speedY = Math.random() * 0.3 - 0.15;
                this.opacity = Math.random() * 0.3 + 0.1;
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }

            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        const particles = [];
        for (let i = 0; i < 100; i++) {
            particles.push(new Particle());
        }

        function animateBackground() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Gradient overlay
            const gradient = ctx.createRadialGradient(
                canvas.width/2, canvas.height/2, 0,
                canvas.width/2, canvas.height/2, canvas.width
            );
            gradient.addColorStop(0, 'rgba(98, 91, 255, 0.02)');
            gradient.addColorStop(0.5, 'rgba(0, 0, 0, 0)');
            gradient.addColorStop(1, 'rgba(255, 126, 95, 0.02)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            requestAnimationFrame(animateBackground);
        }

        animateBackground();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // ==================== AI CHAT ====================
        const messagesArea = document.getElementById('messagesArea');
        const userInput = document.getElementById('userInput');
        const voiceBtn = document.getElementById('voiceBtn');
        const sendBtn = document.getElementById('sendBtn');

        let isListening = false;
        let recognition = null;

        // Initialize speech recognition
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                userInput.value = transcript;
                sendMessage();
                stopListening();
            };

            recognition.onerror = () => stopListening();
            recognition.onend = () => stopListening();
        }

        function toggleVoice() {
            if (!recognition) {
                alert('Voice recognition not supported in this browser');
                return;
            }

            if (isListening) {
                stopListening();
            } else {
                startListening();
            }
        }

        function startListening() {
            isListening = true;
            voiceBtn.classList.add('listening');
            voiceBtn.innerHTML = '<i class="fas fa-microphone"></i>';
            recognition.start();
        }

        function stopListening() {
            isListening = false;
            voiceBtn.classList.remove('listening');
            voiceBtn.innerHTML = '<i class="fas fa-microphone"></i>';
            recognition.stop();
        }

        // Add message to chat
        function addMessage(text, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            
            const timeDiv = document.createElement('div');
            timeDiv.className = 'timestamp';
            timeDiv.textContent = 'just now';
            
            messageDiv.appendChild(contentDiv);
            messageDiv.appendChild(timeDiv);
            messagesArea.appendChild(messageDiv);
            
            // Scroll to bottom
            messagesArea.scrollTop = messagesArea.scrollHeight;
            
            return messageDiv;
        }

        // Show typing indicator
        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.className = 'message assistant';
            indicator.id = 'typingIndicator';
            
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.innerHTML = '<span></span><span></span><span></span>';
            
            indicator.appendChild(typingDiv);
            messagesArea.appendChild(indicator);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }

        // Remove typing indicator
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        // Text to speech
        function speakText(text) {
            if ('speechSynthesis' in window) {
                // Stop any ongoing speech
                window.speechSynthesis.cancel();
                
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 0.9;
                utterance.pitch = 1;
                utterance.volume = 1;
                utterance.lang = 'en-US';
                
                // Get available voices and select a good one
                window.speechSynthesis.onvoiceschanged = () => {
                    const voices = window.speechSynthesis.getVoices();
                    const preferredVoice = voices.find(voice => 
                        voice.name.includes('Google') || 
                        voice.name.includes('Premium') ||
                        voice.lang === 'en-US'
                    );
                    if (preferredVoice) utterance.voice = preferredVoice;
                };
                
                window.speechSynthesis.speak(utterance);
            }
        }

        // Send message to AI
        async function sendMessage() {
            const question = userInput.value.trim();
            if (!question) return;

            // Add user message
            addMessage(question, true);
            userInput.value = '';

            // Show typing indicator
            showTypingIndicator();

            try {
                // Using free OpenRouter API with multiple free models
                const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer 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',
                        'HTTP-Referer': window.location.origin,
                        'X-Title': 'Aesthetic Chat'
                    },
                    body: JSON.stringify({
                        model: 'mistralai/mistral-7b-instruct:free',
                        messages: [
                            { role: 'system', content: 'You are a helpful, concise assistant. Keep responses under 100 words.' },
                            { role: 'user', content: question }
                        ],
                        max_tokens: 150
                    })
                });

                removeTypingIndicator();

                if (response.ok) {
                    const data = await response.json();
                    const answer = data.choices[0].message.content;
                    addMessage(answer);
                    
                    // Speak the answer
                    speakText(answer);
                } else {
                    // Fallback responses if API fails
                    const fallbackAnswers = [
                        "that's an interesting question. let me think about it.",
                        "i understand your query. here's what i can tell you.",
                        "beautiful question. the answer lies in perspective.",
                        "simplicity is the ultimate sophistication. ask again.",
                        "every question holds its own answer within."
                    ];
                    const fallback = fallbackAnswers[Math.floor(Math.random() * fallbackAnswers.length)];
                    addMessage(fallback);
                    speakText(fallback);
                }
            } catch (error) {
                removeTypingIndicator();
                const errorMsg = "sometimes silence speaks louder. please ask again.";
                addMessage(errorMsg);
                speakText(errorMsg);
            }
        }

        // Handle enter key
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Button hover animations
        document.querySelectorAll('.action-btn').forEach(btn => {
            btn.addEventListener('mouseenter', () => {
                btn.style.transform = 'scale(1.05)';
            });
            
            btn.addEventListener('mouseleave', () => {
                btn.style.transform = 'scale(1)';
            });
            
            btn.addEventListener('mousedown', () => {
                btn.style.transform = 'scale(0.95)';
            });
            
            btn.addEventListener('mouseup', () => {
                btn.style.transform = 'scale(1.05)';
            });
        });

        // Smooth initial load
        window.addEventListener('load', () => {
            document.querySelector('.hero').style.opacity = '1';
        });
    </script>
</body>
</html>
